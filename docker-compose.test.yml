# Full-stack e2e test environment: Postgres + SvelteKit app + Caddy reverse proxy
# Usage: docker compose -f docker-compose.test.yml up -d --build --wait

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile.test:/etc/caddy/Caddyfile
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    expose:
      - "3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/boardgames_test
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=boardgames_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes: {}
